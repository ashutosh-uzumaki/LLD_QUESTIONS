
<div id="uml" style="overflow-x:auto;padding:8px 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    classText: dark ? '#c2c0b6' : '#3d3d3a',
    background: 'transparent',
    primaryColor: dark ? '#2a2a3a' : '#E6F1FB',
    primaryBorderColor: dark ? '#4a4a6a' : '#185FA5',
    primaryTextColor: dark ? '#c2c0b6' : '#0C447C',
    secondaryColor: dark ? '#1a3a2a' : '#EAF3DE',
    tertiaryColor: dark ? '#3a2a1a' : '#FAEEDA',
  },
});

const diagram = `classDiagram
    class Movie {
        +Long movieId
        +String title
        +Integer duration
        +String genre
    }
    class Theatre {
        +Long theatreId
        +String name
        +String city
        +String address
    }
    class Screen {
        +Long screenId
        +Long theatreId
        +String name
        +ScreenType screenType
        +AudioType audioType
    }
    class Seat {
        +Long seatId
        +Long screenId
        +String displayName
        +SeatTier seatTier
    }
    class Show {
        +Long showId
        +Long screenId
        +Long movieId
        +LocalDateTime startTime
        +LocalDateTime endTime
        +BigDecimal price
    }
    class ShowSeat {
        +Long showSeatId
        +Long showId
        +Long seatId
        +ShowSeatStatus status
        +BigDecimal price
    }
    class SeatLock {
        +Long userId
        +Long seatId
        +LocalDateTime lockUntil
    }
    class User {
        +Long userId
        +String name
        +String email
        +String phone
    }
    class Booking {
        +Long bookingId
        +Long showId
        +Long userId
        +List~ShowSeat~ showSeats
        +BookingStatus status
        +Payment payment
        +BigDecimal totalAmount
    }
    class Ticket {
        +Long ticketId
        +Long bookingId
        +Long showId
        +Long seatId
        +BigDecimal amount
    }
    class Payment {
        <<interface>>
        +pay(BigDecimal amount) void
    }
    class CreditCardPayment {
        +String cardNumber
        +String cvv
        +String expiryDate
        +pay(BigDecimal amount) void
    }
    class DebitCardPayment {
        +String cardNumber
        +String cvv
        +String expiryDate
        +pay(BigDecimal amount) void
    }
    class UpiPayment {
        +String upiId
        +String phoneNumber
        +pay(BigDecimal amount) void
    }
    class ShowService {
        -ConcurrentHashMap showSeats
        +addSeat(showId, seats) void
        +getSeats(showId) List
        +getAvailableSeats(showId) List
    }
    class SeatLockingService {
        -ConcurrentHashMap seatLocks
        -ConcurrentHashMap showSeatsMap
        -LOCK_DURATION int
        +lockSeats(userId, seats) boolean
        +validateLock(userId, lock) boolean
        +releaseLock(seatId, seat) void
    }
    class BookingService {
        -ConcurrentHashMap bookings
        +selectSeats(userId, showId, seats) boolean
        +createBooking(userId, showId, seats) Booking
        +makePayment(bookingId, userId, payment) boolean
        +cancelBooking(bookingId, userId) boolean
    }

    Payment <|.. CreditCardPayment
    Payment <|.. DebitCardPayment
    Payment <|.. UpiPayment

    Theatre "1" --> "many" Screen
    Screen "1" --> "many" Seat
    Movie "1" --> "many" Show
    Screen "1" --> "many" Show
    Show "1" --> "many" ShowSeat
    Seat "1" --> "many" ShowSeat
    User "1" --> "many" Booking
    Booking "1" --> "many" ShowSeat
    Booking "1" --> "many" Ticket
    Booking "1" --> "1" Payment
    SeatLockingService --> SeatLock
    BookingService --> ShowService
    BookingService --> SeatLockingService
`;

const { svg } = await mermaid.render('uml-svg', diagram);
document.getElementById('uml').innerHTML = svg;
</script>
